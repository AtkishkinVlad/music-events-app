pre-push:
  jobs:
    - name: packages audit
      tags:
        - frontend
        - security
      run: npm audit

    - name: test
      tags:
        - frontend
        - test
      run: npm run test

pre-commit:
  parallel: true
  jobs:
    - name: format
      run: npm run format

    - name: lint
      run: npm run lint
